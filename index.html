<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Шуточный тест: «Какая ты принцесса Disney?» 👑</title>
  <style>
    :root{
      --bg:#0b1220;
      --text:#eaf0ff;
      --muted:#b8c2e0;
      --accent:#7dd3fc;
      --accent2:#a78bfa;
      --btn:#1b2a4a;
      --btnHover:#233861;
      --shadow: 0 12px 40px rgba(0,0,0,.35);
      --radius: 18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 10% 10%, rgba(125,211,252,.18), transparent 55%),
        radial-gradient(1000px 700px at 90% 20%, rgba(167,139,250,.16), transparent 55%),
        radial-gradient(900px 700px at 50% 90%, rgba(52,211,153,.10), transparent 55%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{width:min(880px, 100%)}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    header{padding:22px 22px 0 22px}
    h1{
      margin:0;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing:.2px;
    }
    .subtitle{
      margin:10px 0 0 0;
      color:var(--muted);
      line-height:1.45;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 22px 18px 22px;
      color:var(--muted);
      font-size:14px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      white-space:nowrap;
    }
    .progress{
      width: 220px;
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow:hidden;
    }
    .progress > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      transition: width .25s ease;
    }
    .content{padding:22px; display:grid; gap:18px;}
    .page{ display:none; }
    .page.active{ display:block; }

    .imgbox{
      width:100%;
      aspect-ratio: 16 / 7;
      border-radius: 14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.35);
      user-select:none;
    }
    .imgbox img{width:100%; height:100%; object-fit:cover; display:block;}

    .qtitle{font-size:18px; margin:0; line-height:1.35;}
    .answers{display:grid; gap:10px; margin-top:6px;}

    button{
      border:1px solid rgba(255,255,255,.10);
      background: var(--btn);
      color: var(--text);
      padding: 14px 14px;
      border-radius: 14px;
      cursor:pointer;
      text-align:left;
      font-size:16px;
      line-height:1.35;
      transition: transform .06s ease, background .15s ease, border-color .15s ease;
    }
    button:hover{background: var(--btnHover); border-color: rgba(255,255,255,.18);}
    button:active{transform: translateY(1px);}

    .primary{
      text-align:center;
      font-weight:700;
      background: linear-gradient(90deg, rgba(125,211,252,.22), rgba(167,139,250,.22));
      border-color: rgba(255,255,255,.16);
    }

    .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;}
    .ghost{background: rgba(255,255,255,.04);}

    .resultBox{
      padding:16px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      line-height:1.55;
    }

    footer{
      padding: 0 22px 22px 22px;
      color: rgba(255,255,255,.45);
      font-size: 13px;
    }
    code{color:rgba(255,255,255,.7)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <h1>Шуточный тест: «Какая ты принцесса Диснея?» 🏰</h1>
      </header>

      <div class="topbar">
        <div class="pill">
          <span id="stepLabel">Старт</span>
          <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
        </div>
        <div class="pill"><span id="navHint">Нажми «Узнать, кто я»</span></div>
      </div>

      <div class="content">
        <!-- INTRO -->
        <section class="page active" id="page-intro">
<div class="imgbox" aria-label="Обложка">
  <img src="images/cover.png" alt="Обложка теста">
</div>


          <div class="resultBox">
            <strong>Правила:</strong>
            <ul>
              <li>На каждый вопрос выбирай <strong>один</strong> вариант, который ближе всего к тебе.</li>
            </ul>
          </div>

          <div class="actions">
            <button class="primary" id="startBtn">Узнать, кто я</button>
          </div>
        </section>

        <!-- QUESTIONS -->
        <div id="pages"></div>

        <!-- RESULT -->
        <section class="page" id="page-result">
          <div class="imgbox" id="resultImgBox">
            <img id="resultImg" src="" alt="Картинка результата">
          </div>

          <h2 class="qtitle" id="resultTitle">Ваш результат</h2>
          <div class="resultBox" id="resultText"></div>

          <div class="actions">
            <button class="primary" id="restartBtn">Пройти заново</button>
            <button class="ghost" id="shareBtn" title="Скопировать ссылку">Скопировать ссылку</button>
          </div>
        </section>
      </div>
  </div>

<script>
  // --- DATA ---
const questions = [
{
img:"images/01.png",
text:"1. Как начинается твоё утро на работе?",
answers:[
{key:"A",text:"A. Беру кофе и думаю о чём-нибудь интересном"},
{key:"B",text:"B. Сразу начинаю общаться со всеми вокруг"},
{key:"C",text:"C. Думаю, какие новые идеи можно попробовать"},
{key:"D",text:"D. Быстро собираюсь и готова решать задачи"},
{key:"E",text:"E. Спокойно вхожу в день и держу всё под контролем"}
]
},

{
img:"images/02.png",
text:"2. Если появляется сложная задача, ты:",
answers:[
{key:"A",text:"A. Разберусь во всём и найду умное решение"},
{key:"B",text:"B. Попробую нестандартный и творческий подход"},
{key:"C",text:"C. Рискну и попробую что-то новое"},
{key:"D",text:"D. Возьму ответственность и доведу до результата"},
{key:"E",text:"E. Сохраняю холодную голову и действую уверенно"}
]
},

{
img:"images/03.png",
text:"3. Коллеги чаще всего говорят о тебе:",
answers:[
{key:"A",text:"A. «Она очень умная и интересная»"},
{key:"B",text:"B. «С ней всегда весело»"},
{key:"C",text:"C. «Она очень любопытная и смелая»"},
{key:"D",text:"D. «На неё можно положиться»"},
{key:"E",text:"E. «Она спокойная и уверенная»"}
]
},

{
img:"images/04.png",
text:"4. Идеальный выходной для тебя:",
answers:[
{key:"A",text:"A. Книга, уют и спокойствие"},
{key:"B",text:"B. Поездка, прогулка или приключение"},
{key:"C",text:"C. Исследовать что-то новое"},
{key:"D",text:"D. Активность и движение"},
{key:"E",text:"E. Немного тишины и времени для себя"}
]
},

{
img:"images/05.png",
text:"5. Твоя главная суперсила:",
answers:[
{key:"A",text:"A. Ум и любознательность"},
{key:"B",text:"B. Оптимизм и энергия"},
{key:"C",text:"C. Смелость и тяга к новому"},
{key:"D",text:"D. Сила характера"},
{key:"E",text:"E. Самообладание и уверенность"}
]
}
];

  // Картинки для итогов (свои для каждого результата)
  // Положи файлы в images/ с такими именами (можешь переименовать тут как угодно):
const resultImages = {
A:"images/belle.png",
B:"images/rapunzel.png",
C:"images/ariel.png",
D:"images/mulan.png",
E:"images/elsa.png",
MIX:"images/mix.png"
};

  const results = {

A:{
title:"Ты — Белль 📚",
text:`Ты умная, любознательная и немного мечтательная.
Любишь узнавать новое и ценишь глубокие разговоры.
Твой мир — это идеи, книги и интересные открытия.`
},

B:{
title:"Ты — Рапунцель 🌟",
text:`Ты яркая, энергичная и творческая.
С тобой всегда весело и никогда не скучно.
Ты умеешь вдохновлять людей вокруг своим настроением.`
},

C:{
title:"Ты — Ариэль 🌊",
text:`Ты смелая и любишь пробовать новое.
Приключения, открытия и эксперименты — твоя стихия.
Ты всегда готова выйти за рамки привычного.`
},

D:{
title:"Ты — Мулан ⚔️",
text:`Ты сильная, решительная и надёжная.
На тебя можно положиться в любой ситуации.
Ты умеешь брать ответственность и доводить дело до конца.`
},

E:{
title:"Ты — Эльза ❄️",
text:`Ты уверенная, спокойная и самодостаточная.
Умеешь держать всё под контролем и вдохновляешь других.
Твоя сила — в спокойствии и уверенности.`
},

MIX:{
title:"Ты — смесь принцесс Disney ✨",
text:`В тебе есть понемногу от каждой!
Иногда ты смелая как Ариэль,
иногда спокойная как Эльза,
а иногда любознательная как Белль.`
}

};

  // --- STATE (hidden) ---
  let counts = { A:0, B:0, C:0, D:0, E:0 };
  let currentIndex = -1;
  const chosen = [];

  // --- UI ---
  const pagesRoot = document.getElementById("pages");
  const stepLabel = document.getElementById("stepLabel");
  const progressBar = document.getElementById("progressBar");
  const navHint = document.getElementById("navHint");

  const introPage = document.getElementById("page-intro");
  const resultPage = document.getElementById("page-result");
  const resultTitle = document.getElementById("resultTitle");
  const resultText = document.getElementById("resultText");
  const resultImg = document.getElementById("resultImg");
  const resultImgBox = document.getElementById("resultImgBox");

  function buildQuestionPages(){
    pagesRoot.innerHTML = "";
    questions.forEach((q, idx) => {
      const section = document.createElement("section");
      section.className = "page";
      section.id = `page-q${idx}`;

      const imgBox = document.createElement("div");
      imgBox.className = "imgbox";

      const img = document.createElement("img");
      img.src = q.img;
      img.alt = `Картинка к вопросу ${idx+1}`;
      img.onerror = function(){
        img.style.display = "none";
        imgBox.textContent = `🖼️ Добавь картинку: ${q.img}`;
        imgBox.style.color = "rgba(255,255,255,.45)";
      };
      imgBox.appendChild(img);

      const title = document.createElement("h2");
      title.className = "qtitle";
      title.textContent = q.text;

      const answers = document.createElement("div");
      answers.className = "answers";

      q.answers.forEach(a => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = a.text;
        btn.addEventListener("click", () => chooseAnswer(a.key));
        answers.appendChild(btn);
      });

      const actions = document.createElement("div");
      actions.className = "actions";

      const backBtn = document.createElement("button");
      backBtn.className = "ghost";
      backBtn.type = "button";
      backBtn.textContent = "Назад";
      backBtn.addEventListener("click", goBack);

      actions.appendChild(backBtn);

      section.appendChild(imgBox);
      section.appendChild(title);
      section.appendChild(answers);
      section.appendChild(actions);

      pagesRoot.appendChild(section);
    });
  }

  function showPageByIndex(idx){
    currentIndex = idx;

    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

    if(idx === -1){
      introPage.classList.add("active");
      stepLabel.textContent = "Старт";
      navHint.textContent = "Нажми «Узнать, кто я»";
      progressBar.style.width = "0%";
      return;
    }

    if(idx >= 0 && idx < questions.length){
      document.getElementById(`page-q${idx}`).classList.add("active");
      stepLabel.textContent = `Вопрос ${idx+1} из ${questions.length}`;
      navHint.textContent = "Выбери ответ";
      progressBar.style.width = `${Math.round((idx)/questions.length*100)}%`;
      return;
    }

    resultPage.classList.add("active");
    stepLabel.textContent = "Итог";
    navHint.textContent = "Можно пройти ещё раз";
    progressBar.style.width = "100%";
  }

  function chooseAnswer(key){
    const qIdx = currentIndex;
    if(qIdx < 0 || qIdx >= questions.length) return;

    if(chosen[qIdx]){
      counts[chosen[qIdx]]--;
    }

    chosen[qIdx] = key;
    counts[key]++;

    if(qIdx === questions.length - 1){
      showResult();
    } else {
      showPageByIndex(qIdx + 1);
    }
  }

  function goBack(){
    if(currentIndex === -1) return;

    if(currentIndex >= questions.length){
      showPageByIndex(questions.length - 1);
      return;
    }
    if(currentIndex === 0){
      showPageByIndex(-1);
      return;
    }
    showPageByIndex(currentIndex - 1);
  }

function showResult(){
  const maxVal = Math.max(...Object.values(counts));
  const leaders = Object.entries(counts)
    .filter(([k,v]) => v === maxVal)
    .map(([k]) => k);

  const finalKey = (leaders.length === 1) ? leaders[0] : "MIX";

  const r = results[finalKey];
  resultTitle.textContent = r.title;
  resultText.innerHTML = r.text;

  const imgPath = resultImages[finalKey] || resultImages.MIX;
  resultImgBox.style.color = "rgba(255,255,255,.35)";
  resultImg.style.display = "block";
  resultImg.src = imgPath;
  resultImg.alt = `Картинка результата: ${finalKey}`;

  resultImg.onerror = function(){
    resultImg.style.display = "none";
    resultImgBox.textContent = `🖼️ Добавь картинку результата: ${imgPath}`;
    resultImgBox.style.color = "rgba(255,255,255,.45)";
  };

  showPageByIndex(questions.length);
}

  function resetAll(){
    counts = { A:0, B:0, C:0, D:0, E:0 };
    chosen.length = 0;

    // restore result box state (in case fallback text was shown)
    resultImgBox.textContent = "";
    resultImgBox.appendChild(resultImg);

    showPageByIndex(-1);
  }

  document.getElementById("startBtn").addEventListener("click", () => showPageByIndex(0));
  document.getElementById("restartBtn").addEventListener("click", resetAll);

  document.getElementById("shareBtn").addEventListener("click", async () => {
    const url = window.location.href;
    try{
      await navigator.clipboard.writeText(url);
      alert("Ссылка скопирована! ✅");
    }catch(e){
      prompt("Скопируй ссылку вручную:", url);
    }
  });

  // init
  buildQuestionPages();
  showPageByIndex(-1);
</script>
</body>
</html>
